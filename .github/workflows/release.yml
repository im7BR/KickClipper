name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executables
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executables
        run: |
          python build.py

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "Stream Clipper ${{ github.ref_name }}"
          body: |
            # 🟢 Stream Clipper ${{ github.ref_name }}
            
            > [!IMPORTANT]
            > **Windows SmartScreen Warning**: Because this application is a custom self-compiled executable and not signed with an expensive Microsoft developer certificate, Windows Defender SmartScreen will show a warning saying "Windows protected your PC" on first launch.
            > **To bypass this and run the app**: Click on **"More info"** and then click the **"Run anyway"** button.
            
            ### 🚀 What's New:
            - **TikTok Webcast Fallback**: Resolved stream connection issues for mobile and guest streams (like `higm0555`) by implementing a fallback to the low-level Webcast API.
            - **Exit Cleanup Fix**: Fixed the PyInstaller temporary directory warning popup on closing the app by implementing graceful process/thread termination.
            - **Bypassed Stuck CMD**: Resolved the issue where background updater or server console windows remained stuck on the screen.
            - **Platform Segments Toggle**: Added the option to choose between Kick and TikTok Live streams directly from the dashboard with custom dynamic accents.
            - **Stream Clipper Rebranding**: Unified rebranding of the application name, metadata, and files to "Stream Clipper".
            
            ---
            
            A custom, real-time live stream clipping tool designed for **Kick.com** and **TikTok Live** stream viewers and creators.
            
            ## ✨ Features
            - **🔄 Rolling Stream Buffer**: Automatically captures live streams in 10-second segments, keeping a rolling 5-minute buffer and discarding old segments to save disk space.
            - **⚡ Instant Clipping**: Generates MP4 clips from the buffer in under 1 second without re-encoding.
            - **💻 Standalone Desktop Executable**: Everything is bundled — just download and run. No prerequisites needed.
            - **🌐 Direct API Integration**: Bypasses Cloudflare protection to access Kick and TikTok streams directly. No headless browser required.
            - **📁 Custom Save Location**: Choose where your clips get saved with a native folder picker.
            - **💾 Auto-Reconnect**: Automatically reconnects to the last active channel on startup.
            - **🚀 One-Click Auto-Updates**: Receive notification of updates and upgrade the application in a single click directly from the dashboard.
            
            ## 📥 How to Run
            1. Download `StreamClipper.exe` from this release.
            2. Run `StreamClipper.exe` to launch the application. (Bypass SmartScreen by clicking *More info* -> *Run anyway*).
            3. Select a save location for your clips.
            4. Choose your platform, enter a channel username, and click Connect!
            
            ## 📞 Contact & Support
            If you need help, want to suggest improvements, or have any questions, feel free to reach out:
            - **Discord**: `20n.`
            - **Instagram**: [@aymen.7br](https://instagram.com/aymen.7br)
            - **Email**: [aymen7br@gmail.com](mailto:aymen7br@gmail.com)
          files: |
            dist/StreamClipper.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
