name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executables
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executables
        run: |
          python build.py

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "Beta 1.0"
          body: |
            # 🟢 Kick Clipper (Beta 1.0)
            
            A custom, real-time live stream clipping tool designed for **Kick.com** stream moderators and creators.
            
            ## ✨ Features
            - **🔄 Rolling HLS Buffer**: Automatically captures Kick streams in 10-second segments, keeping a rolling 5-minute buffer and discarding old segments to save disk space.
            - **⚡ Instant Clipping**: Generates MP4 clips from the buffer in under 1 second without re-encoding.
            - **💻 Standalone Desktop Executable**: Run and manage the application directly from your system tray.
            - **💾 Auto-Reconnect**: Automatically attempts to reconnect to the last active channel on startup.
            - **🚀 One-Click Auto-Updates**: Receive notification of updates and upgrade the application in a single click directly from the dashboard.
            
            ## 🛠️ Prerequisites
            Before running `KickClipper.exe`, ensure the following dependencies are installed and added to your system PATH:
            - **FFmpeg**: Install via Windows Package Manager: `winget install Gyan.FFmpeg` (or download from [ffmpeg.org](https://ffmpeg.org/download.html))
            - **Streamlink**: Install via Windows Package Manager: `winget install Streamlink.Streamlink` (or run `pip install streamlink`)
            
            ## 📥 How to Run
            1. Download **both** `KickClipper.exe` and `updater.exe` from this release.
            2. Place both files in the **same directory** on your computer.
            3. Run `KickClipper.exe` to launch the application. The dashboard will open automatically in your browser.
            
            ## 📞 Contact & Support
            If you need help, want to suggest improvements, or have any questions, feel free to reach out:
            - **Discord**: `20n.`
            - **Instagram**: [@aymen.7br](https://instagram.com/aymen.7br)
            - **Email**: [aymen7br@gmail.com](mailto:aymen7br@gmail.com)
          files: |
            dist/KickClipper.exe
            dist/updater.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
